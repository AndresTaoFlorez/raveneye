services:
  sample-app:
    build: apps/sample-app
    ports:
      - "127.0.0.1:${UI_OBSERVER_SAMPLE_APP_PORT:-3000}:3000"
    restart: unless-stopped

  ui-observer:
    build:
      context: .
      dockerfile: apps/observer-server/Dockerfile
    depends_on:
      - sample-app
    environment:
      DISPLAY: ":99"
      UI_OBSERVER_TARGET_URL: "${UI_OBSERVER_TARGET_URL:-http://sample-app:3000}"
      UI_OBSERVER_ALLOWED_HOSTS: "${UI_OBSERVER_ALLOWED_HOSTS:-sample-app,host.docker.internal,localhost,127.0.0.1}"
      UI_OBSERVER_VIEWPORT_WIDTH: "${UI_OBSERVER_VIEWPORT_WIDTH:-1440}"
      UI_OBSERVER_VIEWPORT_HEIGHT: "${UI_OBSERVER_VIEWPORT_HEIGHT:-900}"
      UI_OBSERVER_PROFILE_MODE: "${UI_OBSERVER_PROFILE_MODE:-ephemeral}"
      UI_OBSERVER_RECORD_VIDEO: "${UI_OBSERVER_RECORD_VIDEO:-true}"
      UI_OBSERVER_RECORD_TRACE: "${UI_OBSERVER_RECORD_TRACE:-true}"
    ports:
      # Everything binds to loopback only: watching and controlling the
      # browser is a local-development capability, never a network service.
      - "127.0.0.1:${UI_OBSERVER_NOVNC_PORT:-6080}:6080"
      - "127.0.0.1:${UI_OBSERVER_CDP_PORT:-9222}:9222"
      - "127.0.0.1:${UI_OBSERVER_API_PORT:-8090}:8090"
    volumes:
      # :z relabels for SELinux (Fedora) — see docs/fedora.md.
      - ./artifacts:/artifacts:z
      - ./config:/config:ro,z
      - ui-observer-profile:/browser-profile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "2gb"
    # Chromium needs a graceful window to flush profile data (cookies etc.)
    # through supervisord's ordered shutdown.
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4g
    restart: unless-stopped

volumes:
  ui-observer-profile:
